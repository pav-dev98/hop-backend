services:
  db:
    image: docker.io/library/postgres:16
    container_name: peace-houses-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Puerto interno 5432 (usado por la app vía red de compose). En el host se
    # publica en DB_HOST_PORT (por defecto 5433) para no chocar con otro
    # Postgres que ya use el 5432.
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: peace-houses-api:latest
    container_name: peace-houses-api
    # Todas las variables salen del .env local.
    env_file:
      - .env
    environment:
      # Override obligatorio: dentro de la red de compose la app llega a
      # Postgres por el hostname del servicio `db` (puerto interno 5432), no por
      # el localhost:5433 que usa el DATABASE_URL del host.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
